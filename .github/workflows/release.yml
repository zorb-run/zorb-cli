name: Release

# Fires after the maintainer hits "Publish release" on a draft (or `gh release
# create --draft=false` lands). The CLI binaries are cross-compiled from a
# single ubuntu runner via `bun build --compile`, packaged per platform, and
# attached to the existing release.
on:
  release:
    types: [published]

# `gh release upload` needs write access to the release.
# `id-token: write` is required for the OIDC token used by npm Trusted
# Publishers + provenance attestations.
permissions:
  contents: write
  id-token: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      # Cross-compiles all four targets into dist/<platform>/zorb and copies
      # runners into dist/runners/ (shared across binaries).
      - run: bun run build

      # Layout per tarball:
      #   zorb-<platform>/bin/zorb
      #   zorb-<platform>/runners/...
      # The binary resolves runners via `dirname(execPath)/../runners` (see
      # src/steps/run-action.ts), so `bin/zorb` paired with a sibling
      # `runners/` is what makes code actions find their runtime.
      - name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p artifacts staging
          for target in darwin-x64 darwin-arm64 linux-x64 linux-arm64; do
            stage="staging/zorb-$target"
            mkdir -p "$stage/bin"
            cp "dist/$target/zorb" "$stage/bin/zorb"
            cp -R dist/runners "$stage/runners"
            tar -C staging -czf "artifacts/zorb-$target.tar.gz" "zorb-$target"
          done
          cd artifacts
          sha256sum zorb-*.tar.gz > SHA256SUMS

      # Confirms the layout the compiled binary sees at runtime (binary
      # launches, runner discovery finds runners/, code action returns
      # outputs). Same action runs on every PR.
      - uses: ./.github/actions/smoke-binary

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            artifacts/zorb-darwin-x64.tar.gz \
            artifacts/zorb-darwin-arm64.tar.gz \
            artifacts/zorb-linux-x64.tar.gz \
            artifacts/zorb-linux-arm64.tar.gz \
            artifacts/SHA256SUMS \
            --clobber \
            --repo "${{ github.repository }}"

      # Publish the NPM package. The repo is registered as a Trusted Publisher
      # on npmjs.com, so npm exchanges the GitHub OIDC token (granted by the
      # `id-token: write` permission above) for publish rights — no NPM_TOKEN
      # required. `--provenance` attaches the verifiable build attestation;
      # `--ignore-scripts` skips re-running `prepack` (we already built above).
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - name: Publish to NPM
        run: npm publish --provenance --access public --ignore-scripts
