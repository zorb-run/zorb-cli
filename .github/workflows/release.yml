name: Release

# changesets-driven release. On every push to main:
#   1. If unprocessed changesets are present, open/update a "Version
#      Packages" PR (bumps versions + writes CHANGELOG.md).
#   2. When that PR merges, the same workflow runs again — this time with
#      no changesets and a bumped package.json — and `changeset publish`
#      pushes the package to NPM and cuts a `v<version>` GitHub Release
#      with the new CHANGELOG section as the body (changesets/action
#      handles both automatically via `createGithubReleases: true`).
#   3. The conditional steps after changesets package the four
#      cross-compiled binaries (built by `prepack` inside `npm publish`)
#      and attach them to the GitHub Release.

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # changesets reads git history to find unprocessed changesets;
          # the default shallow checkout isn't enough.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      # `npx changeset publish` (run by changesets/action below) needs npm
      # on PATH and an .npmrc pointing at the registry. Trusted Publisher
      # exchanges the GitHub OIDC token (granted by `id-token: write`) for
      # publish rights — no NPM_TOKEN required. `--provenance` and
      # `--access public` come from `publishConfig` in package.json.
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba # v1.5.3
        id: changesets
        with:
          title: 'ci: version packages'
          commit: 'ci: version packages'
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Steps below only run when changesets actually published. By this
      # point dist/<platform>/zorb exists for all four targets (built by
      # the `prepack` lifecycle inside `npm publish`), and a `v<version>`
      # GitHub Release exists with the CHANGELOG section as its body.
      - if: steps.changesets.outputs.published == 'true'
        name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p artifacts staging
          for target in darwin-x64 darwin-arm64 linux-x64 linux-arm64; do
            stage="staging/zorb-$target"
            mkdir -p "$stage/bin"
            cp "dist/$target/zorb" "$stage/bin/zorb"
            cp -R dist/runners "$stage/runners"
            tar -C staging -czf "artifacts/zorb-$target.tar.gz" "zorb-$target"
          done
          cd artifacts
          sha256sum zorb-*.tar.gz > SHA256SUMS

      - if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/smoke-binary

      - if: steps.changesets.outputs.published == 'true'
        name: Attach binaries to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(jq -r '.[0].version' <<< '${{ steps.changesets.outputs.publishedPackages }}')
          gh release upload "v${version}" \
            artifacts/zorb-darwin-x64.tar.gz \
            artifacts/zorb-darwin-arm64.tar.gz \
            artifacts/zorb-linux-x64.tar.gz \
            artifacts/zorb-linux-arm64.tar.gz \
            artifacts/SHA256SUMS \
            --clobber \
            --repo "${{ github.repository }}"
