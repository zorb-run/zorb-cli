name: Release

# Fires after the maintainer hits "Publish release" on a draft (or `gh release
# create --draft=false` lands). The CLI binaries are cross-compiled from a
# single ubuntu runner via `bun build --compile`, packaged per platform, and
# attached to the existing release.
on:
  release:
    types: [published]

# `gh release upload` needs write access to the release.
permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      # Cross-compiles all four targets into dist/<platform>/zorb and copies
      # runners into dist/runners/ (shared across binaries).
      - run: bun run build

      # Layout per tarball:
      #   zorb-<platform>/bin/zorb
      #   zorb-<platform>/runners/...
      # The binary resolves runners via `dirname(execPath)/../runners` (see
      # src/steps/run-action.ts), so `bin/zorb` paired with a sibling
      # `runners/` is what makes code actions find their runtime.
      - name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p artifacts staging
          for target in darwin-x64 darwin-arm64 linux-x64 linux-arm64; do
            stage="staging/zorb-$target"
            mkdir -p "$stage/bin"
            cp "dist/$target/zorb" "$stage/bin/zorb"
            cp -R dist/runners "$stage/runners"
            tar -C staging -czf "artifacts/zorb-$target.tar.gz" "zorb-$target"
          done
          cd artifacts
          sha256sum zorb-*.tar.gz > SHA256SUMS

      # Smoke the linux-x64 tarball end-to-end: confirms the layout the
      # compiled binary sees at runtime (binary launches, runner discovery
      # finds runners/, code action returns outputs).
      - name: Smoke test linux-x64 tarball
        run: |
          set -euo pipefail
          smoke=$(mktemp -d)
          tar -C "$smoke" -xzf artifacts/zorb-linux-x64.tar.gz
          "$smoke/zorb-linux-x64/bin/zorb" --version
          cat > "$smoke/action.cjs" <<'JS'
          module.exports.action = () => ({ ok: 'true' });
          JS
          cat > "$smoke/zorb.yml" <<'YML'
          tasks:
            smoke:
              steps:
                - run: echo hello
                - uses: ./action.cjs
          YML
          "$smoke/zorb-linux-x64/bin/zorb" run smoke -f "$smoke/zorb.yml"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            artifacts/zorb-darwin-x64.tar.gz \
            artifacts/zorb-darwin-arm64.tar.gz \
            artifacts/zorb-linux-x64.tar.gz \
            artifacts/zorb-linux-arm64.tar.gz \
            artifacts/SHA256SUMS \
            --clobber \
            --repo "${{ github.repository }}"
