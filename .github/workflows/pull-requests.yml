name: Pull Requests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run validate:schema
      - run: bun run test:unit
      # Cross-compile binaries for all four supported platforms so we catch any
      # bun target that breaks. Smoke tests above already exercised the
      # host-platform binary end-to-end.
      - run: bun run build
      # Preview the published NPM tarball — same layout `npm publish` would
      # ship. Prints every packed file with its size, and uploads the .tgz as
      # a workflow artifact so reviewers can download and inspect.
      # `--ignore-scripts` skips re-running the `prepack` build above.
      - name: Preview NPM tarball
        run: bun pm pack --ignore-scripts --destination artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: artifacts/zorb-*.tgz
      # End-to-end smoke against the release tarball layout — same action the
      # release workflow uses to gate uploads.
      - uses: ./.github/actions/smoke-binary

  integration:
    name: integration (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runs-on: ubuntu-24.04
            require-docker: '1'
          - platform: linux-arm
            runs-on: ubuntu-24.04-arm
            require-docker: '1'
          - platform: macos-x64
            runs-on: macos-26-intel
            require-docker: ''
          - platform: macos-arm64
            runs-on: macos-26
            require-docker: ''
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build -- --current
      - run: bun run test:integration
        env:
          ZORB_REQUIRE_DOCKER: ${{ matrix.require-docker }}
          ZORB_REQUIRE_PYTHON: '1'
