name: Pull Requests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run validate:schema
      - run: bun run test:unit
      # Cross-compile binaries for all four supported platforms so we catch any
      # bun target that breaks. Smoke tests above already exercised the
      # host-platform binary end-to-end.
      - run: bun run build
      # End-to-end smoke against the release tarball layout — same action the
      # release workflow uses to gate uploads.
      - uses: ./.github/actions/smoke-binary

  integration:
    # Runs the shell-script integration suite against the compiled binary on
    # each platform we ship a binary for. The harness derives dist/<host>/zorb
    # from `uname` so the same step works on every runner without hardcoding.
    #
    # require-docker is '1' on Linux runners (which ship docker) and empty on
    # macOS runners (which don't). ZORB_REQUIRE_PYTHON is always set — every
    # GitHub-hosted runner ships python3. See integration-tests/lib.sh.
    name: integration (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            require-docker: '1'
          - runner: ubuntu-24.04-arm
            require-docker: '1'
          - runner: macos-latest
            require-docker: ''
          - runner: macos-13
            require-docker: ''
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun scripts/build.ts --current
      - run: bun run test:integration
        env:
          ZORB_REQUIRE_DOCKER: ${{ matrix.require-docker }}
          ZORB_REQUIRE_PYTHON: '1'
