name: Pull Requests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run validate:schema
      - run: bun run test:unit
      # Cross-compile binaries for all four supported platforms so we catch any
      # bun target that breaks. Smoke tests above already exercised the
      # host-platform binary end-to-end.
      - run: bun run build
      # End-to-end smoke against the release tarball layout — same action the
      # release workflow uses to gate uploads.
      - uses: ./.github/actions/smoke-binary

  integration:
    # Runs the shell-script integration suite against the compiled binary.
    # ubuntu-latest has docker + python3 preinstalled, so the docker/ and
    # code/python suites both run (CI=true makes them hard-fail rather than
    # skip — see integration-tests/lib.sh).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # Build the host-platform binary; the harness auto-detects which
      # dist/<host>/zorb to run from `uname`, matching the binary we just
      # built. No need to hardcode linux-x64 here — if the runner ever
      # changes platform, detection still finds the right path.
      - run: bun scripts/build.ts --current
      - run: bun run test:integration
