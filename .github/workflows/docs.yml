name: Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/docs.yml
      - package.json
      - bun.lock
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Pages has a single deployment slot per environment, so a static
# 'pages' group serialises every build across branches and workflow_dispatch
# runs. cancel-in-progress: false because cancelling mid-deploy could leave
# the Pages environment half-flipped.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - uses: actions/configure-pages@v5
      - run: bun install --frozen-lockfile
      - run: bun run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
