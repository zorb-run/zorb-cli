# yaml-language-server: $schema=https://raw.githubusercontent.com/zorb-run/zorb-cli/main/zorb.schema.json

# env: works at three levels with predictable precedence:
#   step env  >  task env  >  workflow env  >  process env
#
# Step env only applies to that step. Task env applies to every step in the
# task. Workflow env applies to every step in every task.

env:
  PROJECT: my-app
  LOG_LEVEL: info
  REGION: eu-west-1

tasks:
  build:
    description: Inherits workflow env and adds NODE_ENV for the task
    env:
      NODE_ENV: production
    steps:
      - name: Workflow + task env are visible here
        run: |
          echo "Project:  $PROJECT"
          echo "Env:      $NODE_ENV"
          echo "Region:   $REGION"
          echo "Log:      $LOG_LEVEL"

      - name: Step env wins over task and workflow env
        env:
          LOG_LEVEL: debug
          CACHE_DIR: /tmp/cache
        run: |
          echo "Log:      $LOG_LEVEL"   # debug — overridden at the step
          echo "Cache:    $CACHE_DIR"   # only visible inside this step

  ship:
    description: Different task — task env starts fresh from the workflow level
    env:
      DEPLOY_TARGET: production
    steps:
      - run: |
          echo "Deploying $PROJECT to $DEPLOY_TARGET in $REGION"
