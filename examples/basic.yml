# yaml-language-server: $schema=https://raw.githubusercontent.com/zorb-run/zorb-cli/main/zorb.schema.json

# The smallest useful zorb.yml: two tasks, no inputs, no env.
tasks:
  hello:
    description: Print a greeting
    steps:
      - run: echo "Hello, world!"

  build:
    description: Multi-step task with named steps
    steps:
      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run build

      - name: Smoke check
        run: node dist/index.js --check
